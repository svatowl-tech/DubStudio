name: Build & Release Desktop App

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    permissions:
      contents: write

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install System Dependencies (Linux Only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools dpkg fakeroot rpm

      - name: Install npm dependencies
        run: npm ci

      - name: Cache FFmpeg Binaries
        id: cache-assets
        uses: actions/cache@v4
        with:
          path: |
            assets/bin
          key: ${{ runner.os }}-assets-${{ hashFiles('scripts/download-ffmpeg.js') }}
          restore-keys: |
            ${{ runner.os }}-assets-

      - name: Download FFmpeg Binaries (If not cached)
        run: node scripts/download-ffmpeg.js
        env:
          NODE_ENV: production

      - name: Generate App Metadata
        run: node scripts/generate-metadata.js

      - name: Build Svelte/React Frontend
        run: npm run build

      - name: Build & Publish Electron App (On Tag Push)
        if: startsWith(github.ref, 'refs/tags/v')
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Prevent macOS codesign errors if certificates are not set up
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Compile Electron App Test (On Push or PR without Tag)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: npx electron-builder --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
